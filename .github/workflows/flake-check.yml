name: "Flake check"
on:
  pull_request:
  push:
    paths:
      - '**.nix'
      - 'flake.lock'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - uses: cachix/install-nix-action@v27
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - run: nix flake check --all-systems
